# ================================================
# ⚠️ WORKFLOW DESHABILITADO - Ahora usamos Render
# ================================================
# Este workflow estaba configurado para GCP con self-hosted runner.
# Render hace el deploy automáticamente sin GitHub Actions.
# ================================================

name: Disabled GCP Workflow

on:
  workflow_dispatch:  # Solo ejecución manual

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow Disabled
        run: |
          echo "⚠️ Este workflow está deshabilitado."
          echo "El deploy se hace automáticamente en Render.com"
          echo "Para más información, ver RENDER_SETUP.md"



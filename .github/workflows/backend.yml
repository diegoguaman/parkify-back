name: Build and Deploy Backend

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, gcp]  # Etiquetas del runner que configuramos en la VM

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login en Artifact Registry
        run: |
          gcloud auth activate-service-account --key-file=gha-creds.json
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev

      - name: Construir imagen Docker
        run: |
          docker build -t southamerica-east1-docker.pkg.dev/training-batch-05/parkify-backend/spring-boot:latest .

      - name: Subir imagen a Artifact Registry
        run: |
          docker push southamerica-east1-docker.pkg.dev/training-batch-05/parkify-backend/spring-boot:latest

      - name: Detener contenedor anterior si existe
        run: |
          docker stop spring-boot || true
          docker rm spring-boot || true

      - name: Correr contenedor actualizado
        run: |
          docker run -d \
            --name spring-boot \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }} \
            -e SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }} \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }} \
            southamerica-east1-docker.pkg.dev/training-batch-05/parkify-backend/spring-boot:latest

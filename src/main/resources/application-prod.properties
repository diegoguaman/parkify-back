# ================================================
# Configuración de Producción para Render
# ================================================

# Database URL proporcionada por Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración SSL requerida por Render PostgreSQL
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.hikari.maximum-pool-size=10

# Hibernate en producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:PT10H}

# CORS - Frontend origin
frontend.origin=${FRONTEND_URL:https://parkify-front.vercel.app}

# Server configuration
server.port=${PORT:8080}
server.error.include-message=never

# Spring Boot optimization for production
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
frontend.origin=https://parkify-front.vercel.app

# ================================================
# Conexión a la BD en perfil "dev"
# ================================================
# Valores por defecto para desarrollo local (apuntan a localhost:5432)
# En Docker, estas variables serán sobrescritas por las definidas en docker-compose.yml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_parkify}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parkify}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate creará/actualizará el esquema automáticamente en dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# (Si quieres ver en consola las consultas SQL)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto en el que arrancará tu aplicación localmente
server.port=8080


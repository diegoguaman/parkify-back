spring.application.name=mini-project

spring.datasource.url=jdbc:mysql://localhost:3306/db_parkify
spring.datasource.username=parkify
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

server.error.include-message=never
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET:TXlUZXN0U2VjcmV0S2V5VGhhdElzTG9uZ0Vub3VnaDEyMw==}
jwt.expiration=${JWT_EXPIRATION:PT10H}